<!doctype html>
<html lang="">
  <head>
    <!-- 基础编码与视图设置 -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

    <!-- 核心 SEO 基础 -->
    <meta name="description" content="DP仓库全新UI管理系统" />
    <meta name="keywords" content="关键词1,关键词2,关键词3" />
    <meta name="author" content="你的名字/团队名" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- 站点识别 -->
    <meta name="application-name" content="你的站点名称" />
    <meta name="apple-mobile-web-app-title" content="站点简称" />

    <!-- 移动端与浏览器定制 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no, email=no" />

    <!-- 颜色与主题（配合浏览器/系统） -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#2b5797" />

    <!-- 资源预加载（提升性能） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 图标与启动屏 -->
    <link rel="icon" type="image/svg+xml" href="/public/dogj.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/public/dogj.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public//favicon.ico" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
